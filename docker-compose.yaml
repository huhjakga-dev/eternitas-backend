services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # IPv6 비활성화 → DNS가 IPv4만 반환하도록 강제
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
